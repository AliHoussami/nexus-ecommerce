<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app">
  <div id="sidebar-container"></div>
  <div class="main-wrap">

    <header class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-sub" id="greeting">Good morning</div>
      </div>
      <div class="header-actions">
        <span style="color:var(--text-3);font-size:13px" id="current-date"></span>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </header>

    <div class="page-content">
      <!-- Stat Grid -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
        <div class="stat-card hover-lift">
          <div class="stat-icon si-indigo">🛍️</div>
          <div class="stat-value" id="s-orders">—</div>
          <div class="stat-label">Orders Today</div>
          <div class="stat-sub" id="s-revenue">Revenue: —</div>
        </div>
        <div class="stat-card hover-lift">
          <div class="stat-icon si-blue">👥</div>
          <div class="stat-value" id="s-customers">—</div>
          <div class="stat-label">Total Customers</div>
          <div class="stat-sub" id="s-products">— products</div>
        </div>
        <div class="stat-card hover-lift">
          <div class="stat-icon si-orange">⚠️</div>
          <div class="stat-value" id="s-stock" style="color:var(--warning)">—</div>
          <div class="stat-label">Low Stock Items</div>
          <div class="stat-sub"><a href="/inventory.html" class="text-accent">View inventory →</a></div>
        </div>
        <div class="stat-card hover-lift">
          <div class="stat-icon si-red">↩️</div>
          <div class="stat-value" id="s-returns" style="color:var(--danger)">—</div>
          <div class="stat-label">Pending Returns</div>
          <div class="stat-sub"><a href="/returns.html" class="text-accent">Review →</a></div>
        </div>
      </div>

      <!-- Charts Row -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px">
        <div class="card">
          <div class="card-head"><span class="card-title">Revenue — Last 30 Days</span></div>
          <div class="card-body" style="padding:16px 22px 20px"><canvas id="salesChart" height="115"></canvas></div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Order Status</span></div>
          <div class="card-body" style="padding:16px 22px">
            <canvas id="statusChart" height="160"></canvas>
            <div id="status-legend" style="margin-top:12px;display:flex;flex-direction:column;gap:6px"></div>
          </div>
        </div>
      </div>

      <!-- Bottom Row -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px">
        <div class="table-wrap">
          <div class="card-head" style="padding:16px 22px;background:var(--surface-2);border-bottom:1px solid var(--border)">
            <span class="card-title">Recent Orders</span>
            <a href="/orders.html" class="btn btn-ghost btn-sm text-accent">View all →</a>
          </div>
          <table class="table">
            <thead><tr>
              <th>Order</th><th>Customer</th><th>Status</th><th style="text-align:right">Total</th><th style="text-align:right">Date</th>
            </tr></thead>
            <tbody id="recent-orders"></tbody>
          </table>
        </div>

        <div class="card" style="overflow:hidden">
          <div class="card-head">
            <span class="card-title">Pending Tasks</span>
            <a href="/tasks.html" class="btn btn-ghost btn-sm text-accent">View all →</a>
          </div>
          <div id="pending-tasks" style="padding:10px;display:flex;flex-direction:column;gap:4px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
  renderSidebar('dashboard');
  checkAuth();

  // Greet + date
  const h = new Date().getHours();
  document.getElementById('greeting').textContent = h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('theme-toggle').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';

  async function load() {
    const [sum, sales, recent, tasks] = await Promise.all([
      API.get('/api/reports/summary'), API.get('/api/reports/sales'),
      API.get('/api/reports/recent-orders'), API.get('/api/tasks')
    ]);

    if (sum) {
      const o = sum.orders;
      document.getElementById('s-orders').textContent   = o.orders_today||0;
      document.getElementById('s-revenue').textContent  = 'Revenue: '+formatCurrency(o.revenue_today);
      document.getElementById('s-customers').textContent= sum.customers;
      document.getElementById('s-products').textContent = sum.products+' products';
      document.getElementById('s-stock').textContent    = sum.low_stock;
      document.getElementById('s-returns').textContent  = sum.pending_returns;

      new Chart(document.getElementById('statusChart'),{
        type:'doughnut',
        data:{
          labels:['Pending','Processing','Shipped','Delivered','Cancelled'],
          datasets:[{data:[o.pending_orders,o.processing_orders,o.shipped_orders,o.delivered_orders,o.cancelled_orders],
            backgroundColor:['#f59e0b','#3b82f6','#8b5cf6','#10b981','#ef4444'],borderWidth:3,borderColor:'var(--surface)'}]
        },
        options:{plugins:{legend:{display:false}},cutout:'72%'}
      });

      const lg = document.getElementById('status-legend');
      [['Pending','#f59e0b',o.pending_orders],['Processing','#3b82f6',o.processing_orders],
       ['Shipped','#8b5cf6',o.shipped_orders],['Delivered','#10b981',o.delivered_orders],
       ['Cancelled','#ef4444',o.cancelled_orders]].forEach(([l,c,n])=>{
        lg.innerHTML+=`<div style="display:flex;align-items:center;justify-content:space-between;font-size:12.5px">
          <div style="display:flex;align-items:center;gap:7px"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div><span style="color:var(--text-2)">${l}</span></div>
          <span style="font-weight:600;color:var(--text)">${n}</span></div>`;
      });
    }

    if (sales?.length) {
      new Chart(document.getElementById('salesChart'),{
        type:'line',
        data:{
          labels:sales.map(r=>new Date(r.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})),
          datasets:[{label:'Revenue',data:sales.map(r=>parseFloat(r.revenue)),
            borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.08)',
            fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#6366f1'}]
        },
        options:{plugins:{legend:{display:false}},scales:{
          y:{ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(0,0,0,.04)'}},
          x:{grid:{display:false}}
        }}
      });
    }

    if (recent) {
      document.getElementById('recent-orders').innerHTML = recent.map(o=>`
        <tr onclick="location='/orders.html'" style="cursor:pointer">
          <td><span class="font-mono text-accent" style="font-size:12px;font-weight:600">${o.order_number}</span></td>
          <td style="font-weight:500">${o.customer_name}</td>
          <td>${statusBadge(o.status)}</td>
          <td style="text-align:right;font-weight:600">${formatCurrency(o.total)}</td>
          <td style="text-align:right;color:var(--text-3);font-size:12px">${timeAgo(o.created_at)}</td>
        </tr>`).join('');
    }

    if (tasks) {
      const pend = tasks.filter(t=>t.status!=='done').slice(0,6);
      document.getElementById('pending-tasks').innerHTML = pend.map(t=>`
        <div style="display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:9px;transition:background .15s;cursor:pointer" onclick="location='/tasks.html'" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
          ${priorityBadge(t.priority)}
          <div style="flex:1;min-width:0">
            <p style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</p>
            <p style="font-size:11.5px;color:var(--text-3);margin-top:2px">${t.assigned_to_name||'Unassigned'} · ${t.due_date?formatDate(t.due_date):'No due date'}</p>
          </div>
        </div>`).join('')||'<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No pending tasks</div></div>';
    }
  }
  load();
</script>
</body>
</html>
