<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Nexus Store</title>
  <link rel="stylesheet" href="/css/customer.css">
</head>
<body>
<script src="/js/customer-common.js"></script>
<script>renderCustomerNav('profile');</script>

<div class="c-page">
  <div class="c-container-md">
    <div class="c-page-head">
      <div class="c-page-title">My Profile</div>
      <div class="c-page-sub">Manage your account information</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

      <!-- Profile Info -->
      <div class="c-card">
        <div class="c-card-head"><span class="c-card-title">Personal Information</span></div>
        <form onsubmit="saveProfile(event)">
          <div class="c-card-body" style="display:flex;flex-direction:column;gap:0">

            <!-- Avatar -->
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)">
              <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff" id="avatar-big">?</div>
              <div>
                <div style="font-weight:700;font-size:16px" id="profile-name-display">Loading…</div>
                <div style="font-size:13px;color:var(--text-3)" id="profile-email-display"></div>
              </div>
            </div>

            <div class="c-form-group">
              <label class="c-label">Full Name</label>
              <input class="c-input" id="p-name" required placeholder="Your full name">
            </div>
            <div class="c-form-group">
              <label class="c-label">Email Address</label>
              <input class="c-input" id="p-email" type="email" disabled style="opacity:.6;cursor:not-allowed">
              <div style="font-size:12px;color:var(--text-3);margin-top:4px">Email cannot be changed</div>
            </div>
            <div class="c-form-group">
              <label class="c-label">Phone Number</label>
              <input class="c-input" id="p-phone" placeholder="+1 (555) 000-0000">
            </div>
            <div class="c-form-group">
              <label class="c-label">Delivery Address</label>
              <textarea class="c-input c-textarea" id="p-address" rows="3" placeholder="Street, City, State, ZIP"></textarea>
            </div>
            <button type="submit" class="c-btn c-btn-primary" id="save-profile-btn">Save Changes</button>
          </div>
        </form>
      </div>

      <div style="display:flex;flex-direction:column;gap:20px">

        <!-- Change Password -->
        <div class="c-card">
          <div class="c-card-head"><span class="c-card-title">Change Password</span></div>
          <form onsubmit="changePassword(event)">
            <div class="c-card-body" style="display:flex;flex-direction:column;gap:0">
              <div class="c-form-group">
                <label class="c-label">Current Password</label>
                <input class="c-input" id="pw-current" type="password" required placeholder="••••••••">
              </div>
              <div class="c-form-group">
                <label class="c-label">New Password</label>
                <input class="c-input" id="pw-new" type="password" required placeholder="Min. 8 characters" minlength="8">
              </div>
              <div class="c-form-group">
                <label class="c-label">Confirm New Password</label>
                <input class="c-input" id="pw-confirm" type="password" required placeholder="Repeat new password" minlength="8">
              </div>
              <button type="submit" class="c-btn c-btn-secondary">Update Password</button>
            </div>
          </form>
        </div>

        <!-- Account Actions -->
        <div class="c-card">
          <div class="c-card-head"><span class="c-card-title">Account</span></div>
          <div class="c-card-body" style="display:flex;flex-direction:column;gap:10px">
            <a href="/customer/orders.html" class="c-btn c-btn-secondary" style="justify-content:center">📦 View My Orders</a>
            <a href="/customer/returns.html" class="c-btn c-btn-secondary" style="justify-content:center">↩️ My Returns</a>
            <button class="c-btn c-btn-ghost" onclick="customerLogout()" style="justify-content:center;color:var(--danger);border-color:var(--danger)">Sign Out</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  checkCustomerAuth().then(customer => {
    if (!customer) return;
    document.getElementById('p-name').value  = customer.name;
    document.getElementById('p-email').value = customer.email;
    document.getElementById('p-phone').value = customer.phone || '';
    document.getElementById('p-address').value = customer.address || '';
    document.getElementById('profile-name-display').textContent  = customer.name;
    document.getElementById('profile-email-display').textContent = customer.email;
    document.getElementById('avatar-big').textContent = customer.name.charAt(0).toUpperCase();
  });

  async function saveProfile(e) {
    e.preventDefault();
    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const res = await CAPI.put('/api/customer/profile', {
      name:    document.getElementById('p-name').value,
      phone:   document.getElementById('p-phone').value,
      address: document.getElementById('p-address').value,
    });
    btn.disabled = false; btn.textContent = 'Save Changes';
    if (res && !res.error) cShowToast('Profile updated successfully!', 'success');
    else cShowToast(res?.error || 'Failed to save', 'error');
  }

  async function changePassword(e) {
    e.preventDefault();
    const newPw  = document.getElementById('pw-new').value;
    const confPw = document.getElementById('pw-confirm').value;
    if (newPw !== confPw) { cShowToast('Passwords do not match', 'error'); return; }
    const res = await CAPI.put('/api/customer/profile/password', {
      current_password: document.getElementById('pw-current').value,
      new_password: newPw,
    });
    if (res && !res.error) {
      cShowToast('Password updated!', 'success');
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-confirm').value = '';
    } else {
      cShowToast(res?.error || 'Failed to update password', 'error');
    }
  }
</script>
</body>
</html>
