<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returns & Refunds — Nexus Store</title>
  <link rel="stylesheet" href="/css/customer.css">
</head>
<body>
<script src="/js/customer-common.js"></script>
<script>renderCustomerNav('returns');</script>

<div class="c-page">
  <div class="c-container">
    <div class="c-page-head" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="c-page-title">Returns & Refunds</div>
        <div class="c-page-sub">Submit and track your return requests</div>
      </div>
      <button class="c-btn c-btn-primary" onclick="cOpenModal('return-modal')">+ New Return Request</button>
    </div>

    <div id="returns-container">
      <div style="text-align:center;padding:60px;color:var(--text-3)">Loading…</div>
    </div>
  </div>
</div>

<!-- New Return Modal -->
<div class="c-modal-overlay hidden" id="return-modal">
  <div class="c-modal" style="max-width:560px">
    <div class="c-modal-head">
      <span class="c-modal-title">Submit Return Request</span>
      <button class="c-modal-close" onclick="cCloseModal('return-modal')">✕</button>
    </div>
    <form onsubmit="submitReturn(event)">
      <div class="c-modal-body">
        <div class="c-form-group">
          <label class="c-label">Select Order</label>
          <select class="c-input c-select" id="r-order" required>
            <option value="">Choose an order…</option>
          </select>
        </div>
        <div class="c-form-group">
          <label class="c-label">Reason for Return</label>
          <select class="c-input c-select" id="r-reason-type" onchange="updateReasonPlaceholder()">
            <option value="">Select a reason…</option>
            <option value="Defective or damaged product">Defective or damaged product</option>
            <option value="Wrong item received">Wrong item received</option>
            <option value="Item not as described">Item not as described</option>
            <option value="Changed my mind">Changed my mind</option>
            <option value="Size or fit issue">Size or fit issue</option>
            <option value="Other">Other (please specify)</option>
          </select>
        </div>
        <div class="c-form-group">
          <label class="c-label">Additional Details</label>
          <textarea class="c-input c-textarea" id="r-reason" rows="3" placeholder="Describe the issue in more detail…"></textarea>
        </div>
      </div>
      <div class="c-modal-footer">
        <button type="button" class="c-btn c-btn-ghost" onclick="cCloseModal('return-modal')">Cancel</button>
        <button type="submit" class="c-btn c-btn-primary">Submit Request</button>
      </div>
    </form>
  </div>
</div>

<script>
  checkCustomerAuth();
  let allReturns = [];
  let deliveredOrders = [];

  async function loadData() {
    const [returns, orders] = await Promise.all([
      CAPI.get('/api/customer/returns'),
      CAPI.get('/api/customer/orders')
    ]);
    allReturns = returns || [];
    deliveredOrders = (orders || []).filter(o => o.status === 'delivered');

    const sel = document.getElementById('r-order');
    sel.innerHTML = '<option value="">Choose an order…</option>' +
      deliveredOrders.map(o => `<option value="${o.id}">${o.order_number} — ${cFormatCurrency(o.total)}</option>`).join('');

    renderReturns();

    // Pre-select from URL param
    const preOrder = new URLSearchParams(location.search).get('order');
    if (preOrder) { sel.value = preOrder; cOpenModal('return-modal'); }
  }

  function renderReturns() {
    const container = document.getElementById('returns-container');
    if (!allReturns.length) {
      container.innerHTML = `
        <div class="c-empty">
          <div class="c-empty-icon">↩️</div>
          <div class="c-empty-text">No return requests yet</div>
          <div class="c-empty-sub">If you have an issue with an order, submit a return request above</div>
        </div>`;
      return;
    }
    container.innerHTML = `
      <div class="c-table-wrap">
        <table class="c-table">
          <thead><tr><th>Return #</th><th>Order</th><th>Reason</th><th style="text-align:right">Refund</th><th>Status</th><th>Submitted</th></tr></thead>
          <tbody>
            ${allReturns.map(r => `
              <tr>
                <td><span style="font-family:monospace;color:var(--text-3)">#${r.id}</span></td>
                <td><span style="font-weight:600;color:var(--accent)">${r.order_number}</span></td>
                <td style="max-width:220px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px">${r.reason}</div></td>
                <td style="text-align:right;font-weight:700">${cFormatCurrency(r.refund_amount)}</td>
                <td>${cStatusBadge(r.status)}</td>
                <td style="color:var(--text-3);font-size:13px">${cFormatDate(r.created_at)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function updateReasonPlaceholder() {
    const val = document.getElementById('r-reason-type').value;
    document.getElementById('r-reason').value = val && val !== 'Other' ? val : '';
  }

  async function submitReturn(e) {
    e.preventDefault();
    const orderId = document.getElementById('r-order').value;
    const reasonType = document.getElementById('r-reason-type').value;
    const reasonDetail = document.getElementById('r-reason').value;
    if (!orderId || !reasonType) { cShowToast('Please select an order and reason', 'error'); return; }

    const reason = reasonDetail ? `${reasonType}: ${reasonDetail}` : reasonType;
    const order = deliveredOrders.find(o => o.id == orderId);

    const res = await CAPI.post('/api/customer/returns', { order_id: orderId, reason, refund_amount: order?.total });
    if (res && !res.error) {
      cShowToast('Return request submitted successfully!', 'success');
      cCloseModal('return-modal');
      loadData();
    } else {
      cShowToast(res?.error || 'Failed to submit return', 'error');
    }
  }

  loadData();
</script>
</body>
</html>
