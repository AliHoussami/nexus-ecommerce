<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports & Analytics — Nexus</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-container"></div>
  <div class="main-wrap">

    <header class="page-header">
      <div>
        <div class="page-title">Reports & Analytics</div>
        <div class="page-sub">Business performance overview</div>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </header>

    <div class="page-content">

      <!-- Stat Cards -->
      <div class="stats-grid">
        <div class="stat-card hover-lift">
          <div class="stat-icon si-indigo">💰</div>
          <div class="stat-value" id="total-revenue">—</div>
          <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card hover-lift">
          <div class="stat-icon si-blue">🛍️</div>
          <div class="stat-value" id="total-orders">—</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card hover-lift">
          <div class="stat-icon si-green">✅</div>
          <div class="stat-value" id="delivered-orders">—</div>
          <div class="stat-label">Delivered</div>
        </div>
        <div class="stat-card hover-lift">
          <div class="stat-icon si-red">✕</div>
          <div class="stat-value" id="cancelled-orders">—</div>
          <div class="stat-label">Cancelled</div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="card">
          <div class="card-head">
            <span class="card-title">Revenue — Last 30 Days</span>
          </div>
          <div class="card-body">
            <canvas id="revenueChart" height="180"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-head">
            <span class="card-title">Revenue by Category</span>
          </div>
          <div class="card-body">
            <canvas id="categoryChart" height="180"></canvas>
          </div>
        </div>
      </div>

      <!-- Top Products -->
      <div class="table-wrap">
        <div class="card-head" style="padding:18px 22px">
          <span class="card-title">Top Products by Sales</span>
        </div>
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Product</th>
              <th>Category</th>
              <th style="text-align:right">Units Sold</th>
              <th style="text-align:right">Revenue</th>
            </tr>
          </thead>
          <tbody id="top-products-tbody">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-3)">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
  renderSidebar('reports');
  checkAuth();
  document.getElementById('theme-toggle').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';

  let revenueChartInst = null;
  let categoryChartInst = null;

  function getChartTextColor() {
    return getComputedStyle(document.documentElement).getPropertyValue('--text-2').trim() || '#475569';
  }

  function getChartGridColor() {
    return getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#e2e8f0';
  }

  async function loadReports() {
    const [summary, sales, categories, topProducts] = await Promise.all([
      API.get('/api/reports/summary'),
      API.get('/api/reports/sales'),
      API.get('/api/reports/by-category'),
      API.get('/api/reports/top-products')
    ]);

    // Summary stats
    if (summary) {
      const o = summary.orders || summary;
      document.getElementById('total-revenue').textContent    = formatCurrency(o.total_revenue || o.revenue || 0);
      document.getElementById('total-orders').textContent     = o.total_orders || 0;
      document.getElementById('delivered-orders').textContent = o.delivered_orders || 0;
      document.getElementById('cancelled-orders').textContent = o.cancelled_orders || 0;
    }

    // Revenue line chart
    if (sales && sales.length) {
      if (revenueChartInst) revenueChartInst.destroy();
      const textColor = getChartTextColor();
      const gridColor = getChartGridColor();
      const labels = sales.map(r =>
        new Date(r.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      );
      revenueChartInst = new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Revenue',
            data: sales.map(r => parseFloat(r.revenue) || 0),
            borderColor: '#6366f1',
            backgroundColor: 'rgba(99,102,241,0.08)',
            borderWidth: 2.5,
            pointBackgroundColor: '#6366f1',
            pointRadius: 3,
            pointHoverRadius: 5,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ' ' + formatCurrency(ctx.raw)
              }
            }
          },
          scales: {
            x: {
              ticks: { color: textColor, font: { size: 11 }, maxTicksLimit: 10 },
              grid: { color: gridColor }
            },
            y: {
              ticks: { color: textColor, font: { size: 11 }, callback: v => '$' + v },
              grid: { color: gridColor }
            }
          }
        }
      });
    } else {
      document.getElementById('revenueChart').parentElement.innerHTML += '<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-text">No sales data available</div></div>';
    }

    // Category doughnut chart
    if (categories && categories.length) {
      if (categoryChartInst) categoryChartInst.destroy();
      const textColor = getChartTextColor();
      const palette = ['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];
      categoryChartInst = new Chart(document.getElementById('categoryChart'), {
        type: 'doughnut',
        data: {
          labels: categories.map(c => c.category || 'Other'),
          datasets: [{
            data: categories.map(c => parseFloat(c.revenue) || 0),
            backgroundColor: palette,
            borderWidth: 3,
            borderColor: getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() || '#fff',
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          cutout: '62%',
          plugins: {
            legend: {
              position: 'right',
              labels: { boxWidth: 13, font: { size: 12 }, color: textColor, padding: 12 }
            },
            tooltip: {
              callbacks: {
                label: ctx => ' ' + ctx.label + ': ' + formatCurrency(ctx.raw)
              }
            }
          }
        }
      });
    } else {
      document.getElementById('categoryChart').parentElement.innerHTML += '<div class="empty-state"><div class="empty-icon">🍩</div><div class="empty-text">No category data available</div></div>';
    }

    // Top products table
    const tbody = document.getElementById('top-products-tbody');
    if (topProducts && topProducts.length) {
      tbody.innerHTML = topProducts.map((p, i) => `
        <tr>
          <td>
            <div style="width:26px;height:26px;border-radius:6px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">
              ${i + 1}
            </div>
          </td>
          <td style="font-weight:600">${p.name}</td>
          <td><span class="chip">${p.category || '—'}</span></td>
          <td style="text-align:right;font-weight:600">${p.units_sold}</td>
          <td style="text-align:right"><strong class="text-accent">${formatCurrency(p.revenue)}</strong></td>
        </tr>
      `).join('');
    } else {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No sales data yet</div></div></td></tr>`;
    }
  }

  loadReports();
</script>
</body>
</html>
