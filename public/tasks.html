<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Nexus</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .kanban-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .col-dot-gray   { width:10px;height:10px;border-radius:50%;background:#94a3b8;flex-shrink:0 }
    .col-dot-blue   { width:10px;height:10px;border-radius:50%;background:#3b82f6;flex-shrink:0 }
    .col-dot-green  { width:10px;height:10px;border-radius:50%;background:#10b981;flex-shrink:0 }
    .col-count {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-2);
      padding: 2px 8px;
      min-width: 24px;
      text-align: center;
    }
    .task-meta { display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--text-3) }
    .task-title { font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4 }
    .task-desc { font-size:12.5px;color:var(--text-2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5 }
    .due-overdue { color:var(--danger);font-weight:600 }
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-container"></div>
  <div class="main-wrap">

    <header class="page-header">
      <div>
        <div class="page-title">Tasks</div>
        <div class="page-sub">Track and manage team tasks</div>
      </div>
      <div class="header-actions">
        <select class="select" id="status-filter" style="width:140px" onchange="filterTasks()">
          <option value="">All Statuses</option>
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <select class="select" id="priority-filter" style="width:140px" onchange="filterTasks()">
          <option value="">All Priorities</option>
          <option value="urgent">Urgent</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <button class="btn btn-primary" onclick="openAddModal()">+ New Task</button>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </header>

    <div class="page-content">
      <div class="kanban-grid">

        <!-- To Do -->
        <div class="kanban-col">
          <div class="kanban-head">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="col-dot-gray"></div>
              <span style="font-weight:600;font-size:13.5px">To Do</span>
            </div>
            <span class="col-count" id="count-todo">0</span>
          </div>
          <div class="kanban-body" id="col-todo">
            <div class="empty-state" style="padding:20px"><div class="empty-icon" style="font-size:24px">📋</div><div class="empty-text">No tasks</div></div>
          </div>
        </div>

        <!-- In Progress -->
        <div class="kanban-col">
          <div class="kanban-head">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="col-dot-blue"></div>
              <span style="font-weight:600;font-size:13.5px">In Progress</span>
            </div>
            <span class="col-count" id="count-in_progress">0</span>
          </div>
          <div class="kanban-body" id="col-in_progress">
            <div class="empty-state" style="padding:20px"><div class="empty-icon" style="font-size:24px">⚙️</div><div class="empty-text">No tasks</div></div>
          </div>
        </div>

        <!-- Done -->
        <div class="kanban-col">
          <div class="kanban-head">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="col-dot-green"></div>
              <span style="font-weight:600;font-size:13.5px">Done</span>
            </div>
            <span class="col-count" id="count-done">0</span>
          </div>
          <div class="kanban-body" id="col-done">
            <div class="empty-state" style="padding:20px"><div class="empty-icon" style="font-size:24px">✅</div><div class="empty-text">No tasks</div></div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- New/Edit Task Modal -->
<div class="modal-overlay hidden" id="task-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-head">
      <span class="modal-title" id="task-modal-title">New Task</span>
      <button class="modal-close" onclick="closeModal('task-modal')">✕</button>
    </div>
    <form id="task-form" onsubmit="saveTask(event)">
      <div class="modal-body">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label class="label">Title</label>
          <input class="input" id="t-title" required placeholder="Task title…">
        </div>
        <div class="form-group">
          <label class="label">Description</label>
          <textarea class="textarea" id="t-description" rows="3" placeholder="Optional description…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="label">Assign To</label>
            <select class="select" id="t-assigned">
              <option value="">Unassigned</option>
            </select>
          </div>
          <div class="form-group">
            <label class="label">Priority</label>
            <select class="select" id="t-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="label">Status</label>
            <select class="select" id="t-status">
              <option value="todo">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label class="label">Due Date</label>
            <input class="input" id="t-due" type="date">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('task-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Task</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
  renderSidebar('tasks');
  checkAuth();
  document.getElementById('theme-toggle').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';

  let allTasks = [];
  let users = [];

  async function loadData() {
    const [tasksData, usersData] = await Promise.all([
      API.get('/api/tasks'),
      API.get('/api/auth/users')
    ]);
    allTasks = tasksData || [];
    users = usersData || [];

    const sel = document.getElementById('t-assigned');
    sel.innerHTML = '<option value="">Unassigned</option>';
    users.forEach(u => sel.innerHTML += `<option value="${u.id}">${u.name}</option>`);

    renderTasks(allTasks);
  }

  function buildTaskCard(t) {
    const overdue = t.due_date && new Date(t.due_date) < new Date() && t.status !== 'done';
    const dueCls = overdue ? 'due-overdue' : '';
    return `
      <div class="task-card hover-lift" onclick="editTask(${t.id})">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
          ${priorityBadge(t.priority)}
        </div>
        <div class="task-title">${t.title}</div>
        ${t.description ? `<div class="task-desc">${t.description}</div>` : ''}
        <div class="task-meta">
          <span>${t.assigned_to_name ? '👤 ' + t.assigned_to_name : '<span class="text-muted">Unassigned</span>'}</span>
          ${t.due_date ? `<span class="${dueCls}">📅 ${formatDate(t.due_date)}</span>` : '<span></span>'}
        </div>
      </div>
    `;
  }

  function renderTasks(tasks) {
    const statusF = document.getElementById('status-filter').value;
    const priorityF = document.getElementById('priority-filter').value;
    const filtered = tasks.filter(t =>
      (!statusF || t.status === statusF) &&
      (!priorityF || t.priority === priorityF)
    );

    ['todo', 'in_progress', 'done'].forEach(s => {
      const items = filtered.filter(t => t.status === s);
      document.getElementById('count-' + s).textContent = items.length;
      const col = document.getElementById('col-' + s);
      if (!items.length) {
        const emojis = { todo: '📋', in_progress: '⚙️', done: '✅' };
        const labels = { todo: 'No tasks', in_progress: 'No tasks in progress', done: 'No completed tasks' };
        col.innerHTML = `<div class="empty-state" style="padding:20px"><div class="empty-icon" style="font-size:24px">${emojis[s]}</div><div class="empty-text">${labels[s]}</div></div>`;
      } else {
        col.innerHTML = items.map(buildTaskCard).join('');
      }
    });
  }

  function filterTasks() {
    renderTasks(allTasks);
  }

  function openAddModal() {
    document.getElementById('task-modal-title').textContent = 'New Task';
    document.getElementById('task-id').value = '';
    document.getElementById('task-form').reset();
    document.getElementById('t-priority').value = 'medium';
    document.getElementById('t-status').value = 'todo';
    openModal('task-modal');
  }

  function editTask(id) {
    const t = allTasks.find(x => x.id === id);
    if (!t) return;
    document.getElementById('task-modal-title').textContent = 'Edit Task';
    document.getElementById('task-id').value = t.id;
    document.getElementById('t-title').value = t.title;
    document.getElementById('t-description').value = t.description || '';
    document.getElementById('t-assigned').value = t.assigned_to || '';
    document.getElementById('t-priority').value = t.priority;
    document.getElementById('t-status').value = t.status;
    document.getElementById('t-due').value = t.due_date ? t.due_date.split('T')[0] : '';
    openModal('task-modal');
  }

  async function saveTask(e) {
    e.preventDefault();
    const id = document.getElementById('task-id').value;
    const data = {
      title:       document.getElementById('t-title').value,
      description: document.getElementById('t-description').value,
      assigned_to: document.getElementById('t-assigned').value || null,
      priority:    document.getElementById('t-priority').value,
      status:      document.getElementById('t-status').value,
      due_date:    document.getElementById('t-due').value || null
    };
    const res = id ? await API.put('/api/tasks/' + id, data) : await API.post('/api/tasks', data);
    if (res && !res.error) {
      showToast(id ? 'Task updated' : 'Task created', 'success');
      closeModal('task-modal');
      const fresh = await API.get('/api/tasks');
      allTasks = fresh || [];
      renderTasks(allTasks);
    } else {
      showToast(res?.error || 'Failed to save task', 'error');
    }
  }

  loadData();
</script>
</body>
</html>
