<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus — Sign In</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-bg" style="background:var(--sidebar-bg)">

<div style="position:fixed;inset:0;background:radial-gradient(ellipse at 25% 50%,rgba(99,102,241,.18) 0%,transparent 55%), radial-gradient(ellipse at 75% 20%,rgba(139,92,246,.13) 0%,transparent 50%);pointer-events:none"></div>

<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px">
  <!-- Logo -->
  <div style="text-align:center;margin-bottom:32px">
    <div style="width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(99,102,241,.4)">⚡</div>
    <h1 style="color:#fff;font-size:28px;font-weight:800;letter-spacing:-.5px">Nexus</h1>
    <p style="color:rgba(255,255,255,.35);font-size:13px;margin-top:4px">E-Commerce Internal Assistant</p>
  </div>

  <!-- Card -->
  <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:36px;width:100%;max-width:400px;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,.4)">
    <h2 style="color:#fff;font-size:18px;font-weight:600;margin-bottom:24px">Welcome back</h2>

    <div id="error-msg" class="hidden" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;margin-bottom:16px"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="label" style="color:rgba(255,255,255,.5)">Email address</label>
        <input id="email" type="email" required placeholder="you@nexus.com"
          style="background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 14px;width:100%;font-size:14px;color:#fff;outline:none;transition:all .2s;font-family:inherit"
          onfocus="this.style.borderColor='#6366f1';this.style.boxShadow='0 0 0 3px rgba(99,102,241,.2)'"
          onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
      </div>
      <div class="form-group">
        <label class="label" style="color:rgba(255,255,255,.5)">Password</label>
        <input id="password" type="password" required placeholder="••••••••"
          style="background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 14px;width:100%;font-size:14px;color:#fff;outline:none;transition:all .2s;font-family:inherit"
          onfocus="this.style.borderColor='#6366f1';this.style.boxShadow='0 0 0 3px rgba(99,102,241,.2)'"
          onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
      </div>
      <button id="submit-btn" type="submit"
        style="width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:9px;padding:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.35);font-family:inherit"
        onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 22px rgba(99,102,241,.5)'"
        onmouseout="this.style.transform='';this.style.boxShadow='0 4px 16px rgba(99,102,241,.35)'">
        Sign In
      </button>
    </form>

    <!-- Demo creds -->
    <div style="margin-top:24px;padding:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px">
      <p style="color:rgba(255,255,255,.3);font-size:11.5px;font-weight:500;margin-bottom:10px">Demo accounts — password: <code style="color:#818cf8;background:rgba(99,102,241,.15);padding:1px 6px;border-radius:4px">admin123</code></p>
      <div style="display:grid;gap:6px">
        <div onclick="fill('admin@nexus.com')" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:6px 8px;border-radius:6px;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background=''">
          <span style="color:rgba(255,255,255,.5);font-size:12.5px">admin@nexus.com</span>
          <span style="color:#818cf8;font-size:11px;background:rgba(99,102,241,.15);padding:2px 8px;border-radius:4px">Admin</span>
        </div>
        <div onclick="fill('sarah@nexus.com')" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:6px 8px;border-radius:6px;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background=''">
          <span style="color:rgba(255,255,255,.5);font-size:12.5px">sarah@nexus.com</span>
          <span style="color:#818cf8;font-size:11px;background:rgba(99,102,241,.15);padding:2px 8px;border-radius:4px">Manager</span>
        </div>
        <div onclick="fill('mike@nexus.com')" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:6px 8px;border-radius:6px;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background=''">
          <span style="color:rgba(255,255,255,.5);font-size:12.5px">mike@nexus.com</span>
          <span style="color:#818cf8;font-size:11px;background:rgba(99,102,241,.15);padding:2px 8px;border-radius:4px">Support</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  fetch('/api/auth/me',{credentials:'include'}).then(r=>r.ok?r.json():null).then(u=>{if(u&&u.id)window.location.href='/dashboard.html'});

  function fill(email) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = 'admin123';
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    btn.textContent = 'Signing in...'; btn.disabled = true; err.classList.add('hidden');
    const res = await fetch('/api/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const data = await res.json();
    if (res.ok) { window.location.href = '/dashboard.html'; }
    else { err.textContent = data.error||'Login failed'; err.classList.remove('hidden'); btn.textContent='Sign In'; btn.disabled=false; }
  });
</script>
</body>
</html>
